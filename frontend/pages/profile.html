<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile | CarbonTrack</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../css/dashboard.css">

    <link rel="stylesheet"
          href="../css/profile.css">

</head>

<body>

<div class="dashboard">

   <!-- ==========================
     SIDEBAR
========================== -->

<aside class="sidebar">

    <div class="logo">

        <i class="fa-solid fa-leaf"></i>

        <span>CarbonTrack</span>

    </div>

    <nav class="sidebar-menu">

        <a href="dashboard.html" class="menu-item">

            <i class="fa-solid fa-house"></i>

            <span>Dashboard</span>

        </a>

        <a href="calculator.html" class="menu-item">

            <i class="fa-solid fa-calculator"></i>

            <span>Calculator</span>

        </a>

        <a href="history.html" class="menu-item">

            <i class="fa-solid fa-chart-line"></i>

            <span>History</span>

        </a>

        <a href="goals.html" class="menu-item">

            <i class="fa-solid fa-bullseye"></i>

            <span>Goals</span>

        </a>

        <a href="reports.html" class="menu-item">

            <i class="fa-solid fa-file-lines"></i>

            <span>Reports</span>

        </a>

        <a href="profile.html" class="menu-item active">

            <i class="fa-solid fa-user"></i>

            <span>Profile</span>

        </a>

        <a href="#" class="menu-item logout" id="logoutBtn">

            <i class="fa-solid fa-right-from-bracket"></i>

            <span>Logout</span>

        </a>

    </nav>

</aside>

<!-- ==========================
     MAIN CONTENT
========================== -->

<main class="main-content">

    <header class="top-navbar">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Search...">

        </div>

        <div class="top-right">

            <div class="notification">

                <button class="icon-btn">

                    <i class="fa-regular fa-bell"></i>

                </button>

                <span class="notification-count">3</span>

            </div>

            <div class="user-profile">

                <div class="user-avatar">
                    <i class="fa-solid fa-user-circle" style="font-size:40px;color:#2E7D32;"></i>
                </div>

                <div class="user-info">

                    <h4 id="userName">User</h4>

                    <p>Eco Warrior 🌿</p>

                </div>

            </div>

        </div>

    </header>

    <!-- ==========================
         PROFILE BODY
    ========================== -->

    <section class="dashboard-body">

        <div class="profile-header">
            
            <h1>User Profile</h1>
            
            <p>Manage your account settings and update your information.</p>

        </div>

        <div class="profile-container">

            <!-- Profile Info Card -->
            <div class="profile-card">
                
                <div class="profile-card-header">
                    <i class="fa-solid fa-user-circle" style="font-size:60px;color:#2E7D32;"></i>
                    <div>
                        <h2 id="displayFullName">Loading...</h2>
                        <p id="displayEmail">loading@example.com</p>
                        <p class="join-date" id="displayJoinDate">Joined: ...</p>
                    </div>
                </div>

                <form id="updateProfileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="editFullName" required>
                    </div>
                    <button type="submit" class="save-btn" id="saveProfileBtn">Update Profile</button>
                </form>

            </div>

            <!-- Change Password Card -->
            <div class="profile-card">

                <h3>Change Password</h3>

                <form id="changePasswordForm">
                    
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" required>
                    </div>

                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" required>
                    </div>

                    <button type="submit" class="save-btn" id="changePwdBtn">Change Password</button>

                </form>

            </div>

        </div>

    </section>

</main>

</div>

<script src="../js/profile.js"></script>

</body>

</html>
