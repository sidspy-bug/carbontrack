<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | CarbonTrack</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../css/auth.css">

</head>

<body>

<section class="register-container">

    <!-- Left Side -->

    <div class="left-panel">

        <h1>CarbonTrack</h1>

        <p>

            Welcome back! Login to continue
            tracking your carbon footprint.

        </p>

        <img src="../images/register.svg"
             alt="Login Illustration">

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="register-card">

            <h2>Welcome Back</h2>

            <p>

                Login to your CarbonTrack account.

            </p>

            <!-- Login Form -->

            <form class="register-form" id="loginForm">

                <!-- Email -->

                <div class="input-group">

                    <label for="email">Email Address</label>

                    <div class="input-box">

                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email">

                    </div>

                    <small class="error" id="loginEmailError"></small>

                </div>

                <!-- Password -->

                <div class="input-group">

                    <label for="password">Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter your password">

                        <i class="fa-solid fa-eye toggle-password"></i>

                    </div>

                    <small class="error" id="loginPasswordError"></small>

                </div>

                <!-- Button -->

                <button type="submit" class="register-btn" id="login-btn">

                    <i class="fa-solid fa-right-to-bracket"></i>

                    Login

                </button>

                <!-- Register Link -->

                <div class="login-link">

                    Don't have an account?

                    <a href="register.html">Register</a>

                </div>

            </form>

        </div>

    </div>

</section>

<script src="../js/auth.js"></script>

</body>

</html>
