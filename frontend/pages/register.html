<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | CarbonTrack</title>

    <!-- Google Fonts -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="../css/auth.css">

</head>

<body>

<section class="register-container">

    <!-- Left Side -->

    <div class="left-panel">

        <h1>CarbonTrack</h1>

        <p>

            Every small step towards sustainability
            creates a greener tomorrow.

        </p>

        <img src="../images/register.svg"
             alt="Register Illustration">

    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <div class="register-card">

            <h2>Create Account</h2>

            <p>

                Start tracking your carbon footprint today.

            </p>

            <!-- Register Form -->

            <form class="register-form" id="registerForm">

    <!-- Full Name -->

    <div class="input-group">

        <label for="fullname">Full Name</label>

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input
                type="text"
                id="fullname"
                placeholder="Enter your full name">

        </div>

        <small class="error" id="nameError"></small>

    </div>

    <!-- Email -->

    <div class="input-group">

        <label for="email">Email Address</label>

        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input
                type="email"
                id="email"
                placeholder="Enter your email">

        </div>

        <small class="error" id="emailError"></small>

    </div>

    <!-- Password -->

    <div class="input-group">

        <label for="password">Password</label>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
                type="password"
                id="password"
                placeholder="Create a password">

            <i class="fa-solid fa-eye toggle-password"></i>

        </div>

        <small class="error" id="passwordError"></small>

    </div>

    <!-- Confirm Password -->

    <div class="input-group">

        <label for="confirmPassword">Confirm Password</label>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password">

            <i class="fa-solid fa-eye toggle-password"></i>

        </div>

        <small class="error" id="confirmPasswordError"></small>

    </div>

    <!-- Checkbox -->

    <div class="checkbox-group">

        <input
            type="checkbox"
            id="terms">

        <label for="terms">

            I agree to the
            <a href="#">Terms & Conditions</a>

        </label>

    </div>

    <!-- Button -->

    <button type="submit" class="register-btn" id="register-btn">

        <i class="fa-solid fa-leaf"></i>

        Create Account

    </button>

    <!-- Login -->

    <div class="login-link">

        Already have an account?

        <a href="login.html">Login</a>

    </div>

</form>

        </div>

    </div>

</section>


<script src="../js/auth.js"></script>
</body>

</html>
